server.port=8080

spring.application.name=codegraph

spring.datasource.url=jdbc:h2:file:./data/codegraph-db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# Where problem images will be stored
codegraph.storage.problem-images=uploads/problems

# Temporary workspace for code execution
codegraph.judge.workspace-root=workspaces

# Auto cleanup workspace (true/false)
codegraph.judge.cleanup=true

# Max execution time per testcase (ms)
codegraph.judge.time-limit-ms=2000

# JVM memory limit
codegraph.judge.max-memory=128m

# Max output size in bytes (1MB)
codegraph.judge.max-output-bytes=1048576

# If javac/java are not in PATH, specify full paths
codegraph.judge.javac=javac
codegraph.judge.java=java

logging.level.root=INFO
logging.level.com.codegraph=DEBUG
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n

spring.jackson.serialization.indent-output=true

spring.devtools.restart.enabled=true

# Judge Settings
judge.workspace=workspaces
judge.timeout-seconds=3
judge.java-memory=256m